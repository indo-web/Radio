<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suara Besuki FM - 102.5 Mhz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .radio-container {
            background-color: #8B6914;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            min-width: 350px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #A67C00;
        }

        .radio-title {
            color: white;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .station-name {
            color: orange;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .frequency {
            color: yellow;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .location {
            color: gray;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .tagline {
            color: blue;
            font-size: 18px;
            font-style: italic;
            margin-bottom: 30px;
        }

        .play-button {
            background-color: green;
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 100, 0, 0.4);
        }

        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 100, 0, 0.6);
        }

        .play-button.playing {
            background-color: red;
            box-shadow: 0 5px 15px rgba(200, 0, 0, 0.4);
        }

        .play-button.playing:hover {
            box-shadow: 0 8px 20px rgba(200, 0, 0, 0.6);
        }

        .status {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
        }

        .status.on-air {
            color: pink;
        }

        .status.off-air {
            color: #5D4037;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .wave-animation {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin: 20px 0;
        }

        .wave-animation.active {
            display: flex;
        }

        .wave-bar {
            width: 8px;
            height: 40px;
            background-color: #FFD700;
            border-radius: 4px;
            animation: wave 1s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; }

        @keyframes wave {
            0%, 100% {
                height: 15px;
            }
            50% {
                height: 45px;
            }
        }

        .visualizer-container {
            display: none;
            justify-content: center;
            align-items: flex-end;
            height: 60px;
            margin: 20px 0;
            gap: 6px;
        }

        .visualizer-container.active {
            display: flex;
        }

        .visualizer-bar {
            width: 10px;
            background: linear-gradient(to top, #FF6B00, #FFD700, #00FF00);
            border-radius: 3px;
            transition: height 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <div class="logo">📻</div>
        <div class="radio-title">Radio</div>
        <div class="station-name">Suara Besuki FM</div>
        <div class="frequency">102.5 Mhz</div>
        <div class="location">Tulungagung</div>
        <div class="tagline">cahaya dari selatan</div>

        <button class="play-button" id="playBtn" onclick="togglePlay()">Play</button>

        <div class="wave-animation" id="waveAnim">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <div class="visualizer-container" id="visualizer">
            <div class="visualizer-bar" id="bar1" style="height: 15px;"></div>
            <div class="visualizer-bar" id="bar2" style="height: 25px;"></div>
            <div class="visualizer-bar" id="bar3" style="height: 35px;"></div>
            <div class="visualizer-bar" id="bar4" style="height: 20px;"></div>
            <div class="visualizer-bar" id="bar5" style="height: 40px;"></div>
            <div class="visualizer-bar" id="bar6" style="height: 30px;"></div>
            <div class="visualizer-bar" id="bar7" style="height: 45px;"></div>
            <div class="visualizer-bar" id="bar8" style="height: 25px;"></div>
            <div class="visualizer-bar" id="bar9" style="height: 35px;"></div>
            <div class="visualizer-bar" id="bar10" style="height: 20px;"></div>
            <div class="visualizer-bar" id="bar11" style="height: 30px;"></div>
            <div class="visualizer-bar" id="bar12" style="height: 15px;"></div>
        </div>

        <div class="status off-air" id="statusText">radio off air</div>
    </div>

    <audio id="radioAudio" loop>
        <source src="https://indo-web.github.io/Suara-Besuki-FM/" type="audio/mpeg">
    </audio>

    <script>
        let isPlaying = false;
        const audio = document.getElementById('radioAudio');
        const playBtn = document.getElementById('playBtn');
        const statusText = document.getElementById('statusText');
        const waveAnim = document.getElementById('waveAnim');
        const visualizer = document.getElementById('visualizer');

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                audio.currentTime = 0;
                playBtn.textContent = 'Play';
                playBtn.classList.remove('playing');
                statusText.textContent = 'radio off air';
                statusText.classList.remove('on-air');
                statusText.classList.add('off-air');
                waveAnim.classList.remove('active');
                visualizer.classList.remove('active');
                stopVisualizerAnimation();
            } else {
                audio.play().then(() => {
                    playBtn.textContent = 'Stop';
                    playBtn.classList.add('playing');
                    statusText.textContent = 'radio on air';
                    statusText.classList.remove('off-air');
                    statusText.classList.add('on-air');
                    waveAnim.classList.add('active');
                    visualizer.classList.add('active');
                    startVisualizerAnimation();
                }).catch(error => {
                    alert('Tidak dapat memutar audio. Pastikan stream radio tersedia.');
                    console.error('Error:', error);
                });
            }
            isPlaying = !isPlaying;
        }

        function startVisualizerAnimation() {
            const bars = document.querySelectorAll('.visualizer-bar');
            bars.forEach(bar => {
                bar.style.animationPlayState = 'running';
            });
            animateVisualizer();
        }

        function stopVisualizerAnimation() {
            const bars = document.querySelectorAll('.visualizer-bar');
            bars.forEach(bar => {
                bar.style.animation = 'none';
                bar.style.height = '15px';
            });
        }

        function animateVisualizer() {
            if (!isPlaying) return;
            
            const bars = document.querySelectorAll('.visualizer-bar');
            bars.forEach(bar => {
                const randomHeight = Math.floor(Math.random() * 45) + 10;
                bar.style.height = randomHeight + 'px';
            });
            
            setTimeout(animateVisualizer, 150);
        }

        audio.addEventListener('error', function() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playBtn.textContent = 'Play';
                playBtn.classList.remove('playing');
                statusText.textContent = 'radio off air';
                statusText.classList.remove('on-air');
                statusText.classList.add('off-air');
                waveAnim.classList.remove('active');
                visualizer.classList.remove('active');
                alert('Stream radio tidak tersedia atau mengalami gangguan.');
            }
        });
    </script>

</body>
</html>
